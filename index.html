<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DTRX Audio Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <div class="container">

        <h1>DTRX</h1>
        <p>🎧 Audio Experience</p>

        <!-- Headphone Test -->
        <section>
            <h2>Test your headphones</h2>
            <button onclick="startTest()">Start Test</button>
        </section>

        <!-- Drop Button -->
        <section>
            <h2>Drop Test 🔥</h2>
            <button onclick="playDrop()">DROP IT</button>
        </section>

        <!-- Music -->
        <section>
            <h2>Escape the Darkness</h2>
            <iframe src="https://www.youtube.com/embed/eJGN_oL5rBo" frameborder="0" allowfullscreen>
            </iframe>

            <a href="https://www.youtube.com/@dtrxbeats" target="_blank">
                <button>Listen on YouTube</button>
            </a>
        </section>

    </div>

    <script src="scripts/audio.js"></script>
</body>

</html>
